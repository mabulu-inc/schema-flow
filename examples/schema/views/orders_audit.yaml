# View: orders_audit
# Audit-safe view with masked payment details.
# Grant auditors access to this view instead of the base table
# when they need to see payment_method in redacted form.

view: orders_audit
query: |
  SELECT id, tenant_id, user_id, amount, status,
         '****' || right(payment_method, 4) AS payment_method,
         created_at
  FROM orders
comment: "Audit view with masked payment details"
