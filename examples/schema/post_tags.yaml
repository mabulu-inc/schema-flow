# Schema for table: post_tags (join table)

table: post_tags

columns:
  - name: post_id
    type: integer
    references:
      table: posts
      column: id
      on_delete: CASCADE

  - name: tag_id
    type: integer
    references:
      table: tags
      column: id
      on_delete: CASCADE

primary_key: [post_id, tag_id]

indexes:
  - columns: [tag_id]
