# Schema for table: todos
# Core table — each row is a single task.
# Foreign key to categories is optional (nullable).
# The priority enum controls urgency levels.

table: todos

use: [timestamps]

columns:
  - name: id
    type: serial
    primary_key: true

  - name: title
    type: varchar(255)

  - name: description
    type: text
    nullable: true

  - name: category_id
    type: integer
    nullable: true
    references:
      table: categories
      column: id
      on_delete: SET NULL

  - name: priority
    type: priority
    default: "'medium'"

  - name: due_date
    type: date
    nullable: true

  - name: completed_at
    type: timestamptz
    nullable: true

  - name: position
    type: integer
    default: "0"

indexes:
  - columns: [category_id]

  - columns: [due_date]
    where: "completed_at IS NULL"
    comment: "Find upcoming incomplete tasks"

  - columns: [priority, position]
    where: "completed_at IS NULL"
    comment: "Sort active tasks by priority then position"

checks:
  - name: chk_title_not_empty
    expression: "length(trim(title)) > 0"
