# Schema for table: categories
# Hierarchical content categories. parent_id is a self-referencing FK
# for nesting (e.g. "Tech" → "Frontend" → "React").

table: categories

use: [auditable, soft_delete]

rls: true

columns:
  - name: id
    type: serial
    primary_key: true

  - name: name
    type: varchar(100)

  - name: slug
    type: varchar(100)
    unique: true

  - name: description
    type: text
    nullable: true

  - name: parent_id
    type: integer
    nullable: true
    references:
      table: categories
      column: id
      on_delete: SET NULL

  - name: position
    type: integer
    default: "0"

indexes:
  - columns: [parent_id]

  - columns: [slug]
    unique: true

checks:
  - name: chk_slug_format
    expression: "slug ~ '^[a-z0-9]+(-[a-z0-9]+)*$'"

  - name: chk_no_self_parent
    expression: "parent_id IS DISTINCT FROM id"

policies:
  - name: anyone_reads_categories
    for: SELECT
    to: [cms_author, cms_editor, cms_admin]
    using: "deleted_at IS NULL"

  - name: editors_manage_categories
    for: ALL
    to: [cms_editor, cms_admin]
    using: "true"
    check: "true"

seeds:
  - {name: General,     slug: general,     position: 0}
  - {name: News,        slug: news,        position: 1}
  - {name: Tutorials,   slug: tutorials,   position: 2}
  - {name: Engineering, slug: engineering,  position: 3}

grants:
  - to: [cms_author, cms_editor, cms_admin]
    privileges: [SELECT]

  - to: [cms_editor, cms_admin]
    privileges: [INSERT, UPDATE, DELETE]
