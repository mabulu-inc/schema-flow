# Mixin: soft_delete
# Adds a deleted_at column and a partial index for active records.
# Queries should filter on `deleted_at IS NULL` to hide soft-deleted rows.

mixin: soft_delete

columns:
  - name: deleted_at
    type: timestamptz
    nullable: true

indexes:
  - name: idx_{table}_active
    columns: [deleted_at]
    where: "deleted_at IS NULL"
