# Mixin: tenant_isolation
# Adds a tenant_id column and an RLS policy that restricts access
# to rows matching the current tenant. Apply with `use: [tenant_isolation]`.

mixin: tenant_isolation

rls: true

columns:
  - name: tenant_id
    type: uuid

policies:
  - name: "{table}_tenant_isolation"
    for: ALL
    using: "tenant_id = current_setting('app.tenant_id')::uuid"
    check: "tenant_id = current_setting('app.tenant_id')::uuid"
