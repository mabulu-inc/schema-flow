# Schema for table: posts
# Foreign keys reference other tables — schema-flow handles the ordering.
# Timestamps (created_at, updated_at) come from the timestamps mixin.
# RLS ensures authors can only modify their own posts.

table: posts

use: [timestamps]

rls: true

columns:
  - name: id
    type: serial
    primary_key: true

  - name: author_id
    type: integer
    references:
      table: users
      column: id
      on_delete: CASCADE

  - name: title
    type: varchar(255)

  - name: slug
    type: varchar(255)
    unique: true

  - name: body
    type: text
    nullable: true

  - name: status
    type: varchar(20)
    default: "'draft'"

  - name: published_at
    type: timestamptz
    nullable: true

indexes:
  - columns: [author_id]

  - columns: [slug]
    unique: true

  - columns: [status, published_at]

policies:
  - name: authors_manage_own_posts
    for: ALL
    using: "author_id = current_setting('app.user_id')::integer"
    check: "author_id = current_setting('app.user_id')::integer"
