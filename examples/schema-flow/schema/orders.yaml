# Schema for table: orders
# Multi-role RLS example: users, managers, auditors, and a service role.
# Tenant isolation comes from the tenant_isolation mixin (RESTRICTIVE).
# Per-role PERMISSIVE policies control row access by command.

table: orders

use: [tenant_isolation, timestamps]

columns:
  - name: id
    type: serial
    primary_key: true

  - name: user_id
    type: integer
    references:
      table: users
      column: id
      on_delete: CASCADE

  - name: amount
    type: integer

  - name: status
    type: text
    default: "'draft'"

  - name: payment_method
    type: text
    nullable: true

indexes:
  - columns: [user_id]

  - columns: [status, created_at]

checks:
  - name: chk_positive_amount
    expression: "amount > 0"

policies:
  # Users: read and create their own orders, edit only drafts/pending
  - name: users_select_own
    for: SELECT
    to: [app_user]
    using: "user_id = current_setting('app.user_id')::int"

  - name: users_insert_own
    for: INSERT
    to: [app_user]
    check: "user_id = current_setting('app.user_id')::int"

  - name: users_update_own
    for: UPDATE
    to: [app_user]
    using: "user_id = current_setting('app.user_id')::int"
    check: "status IN ('draft', 'pending')"

  # Managers: full read/write within the tenant
  - name: managers_select
    for: SELECT
    to: [app_manager]
    using: "true"

  - name: managers_update
    for: UPDATE
    to: [app_manager]
    using: "true"
    check: "true"

  # Auditors: read-only
  - name: auditors_select
    for: SELECT
    to: [app_auditor]
    using: "true"

  # Service role: unrestricted within tenant
  - name: service_all
    for: ALL
    to: [app_service]
    using: "true"
    check: "true"
